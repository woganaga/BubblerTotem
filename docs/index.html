<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'>
<title>Bubbler Totem</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#eee;-webkit-tap-highlight-color:transparent}
#app{max-width:420px;margin:0 auto;padding:calc(0.8em + env(safe-area-inset-top)) 1em calc(1em + env(safe-area-inset-bottom))}
#status{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:0.7em 1em;margin-bottom:0.9em;font-size:0.95em;line-height:1.6}
#status b{color:#fff;font-weight:600}
#status .dim{color:#999}
#status .grn{color:#4caf50}
label{display:block;color:#ccc;font-size:0.9em;margin:0.9em 0 0.2em}
input[type=range]{width:100%;height:2em}
button{display:block;width:100%;margin:0.5em 0;padding:0.9em;min-height:48px;border-radius:10px;background:#262626;color:#fff;font-size:1em;border:none;font-family:inherit;cursor:pointer}
button.active{background:#4caf50}
button.warn{background:#5a2323}
.row{display:flex;gap:0.5em}
.row button{flex:1}
h2{font-size:0.8em;text-transform:uppercase;letter-spacing:0.06em;color:#888;margin:1.3em 0 0.2em}
#connectScreen{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1em;text-align:center;padding:1em}
#connectScreen button{max-width:280px;background:#4caf50;font-size:1.1em}
#connectError{color:#ff5252;font-size:0.9em;min-height:1.2em;max-width:320px}
#connectScreen .hint{color:#777;font-size:0.85em;max-width:300px;line-height:1.5}
#main{display:none}
</style>
</head>
<body>
<div id="app">

<div id="connectScreen">
  <div style="font-size:2.5em">🫧</div>
  <div style="font-size:1.3em;font-weight:600">Bubbler Totem</div>
  <button onclick="connect()">Connect</button>
  <div id="connectError"></div>
  <div class="hint">Uses Web Bluetooth. On iPhone/iPad open this page in the Bluefy browser; on Android use Chrome.</div>
</div>

<div id="main">
  <div id="status">
    <div><span class="dim">Effect:</span> <b id="stFx">&ndash;</b></div>
    <div><span class="dim">Playlist:</span> <b id="stPl">&ndash;</b></div>
    <div><span class="dim">Bubbles:</span> <b id="stBub">&ndash;</b></div>
  </div>

  <label>Brightness <input type="range" id="bri" min="1" max="255" value="128"
    oninput="briInput(this.value)" onpointerdown="briHold=true" onpointerup="briHold=false"></label>

  <h2>Playlists</h2>
  <div class="row">
    <button id="pl1" onclick="send({on:true,ps:1})">Ambient</button>
    <button id="pl2" onclick="send({on:true,ps:2})">Pulse</button>
  </div>
  <div class="row">
    <button id="pl3" onclick="send({on:true,ps:3})">Flow</button>
    <button id="pl4" onclick="send({on:true,ps:4})">Party</button>
  </div>
  <button id="offBtn" class="warn" onclick="send({on:false})">Effects Off</button>

  <h2>Bubbles</h2>
  <div class="row">
    <button id="bubOn" onclick="send({MultiRelay:[{relay:0,cycle:false},{relay:0,on:true}]})">On</button>
    <button id="bubOff" onclick="send({MultiRelay:[{relay:0,cycle:false},{relay:0,on:false}]})">Off</button>
    <button id="bubTimer" onclick="send({MultiRelay:{relay:0,cycle:'t'}})">Timer</button>
  </div>
</div>

</div>
<script>
var SERVICE_UUID = '7a5a1000-0002-4b70-8f1a-9d6e9c9a2b10';
var RX_UUID = '7a5a1001-0002-4b70-8f1a-9d6e9c9a2b10'; // write: JSON commands in
var TX_UUID = '7a5a1002-0002-4b70-8f1a-9d6e9c9a2b10'; // notify: status JSON out

var PLAYLISTS = {1:'Ambient', 2:'Pulse', 3:'Flow', 4:'Party'};

var dev = null, rxChr = null, txChr = null;
var briHold = false, briTimer = null, briQueued = null;
var enc = new TextEncoder(), dec = new TextDecoder();

function gId(i){ return document.getElementById(i); }

async function connect() {
  gId('connectError').textContent = '';
  if (!navigator.bluetooth) {
    gId('connectError').textContent = 'Web Bluetooth is not available in this browser.';
    return;
  }
  try {
    dev = await navigator.bluetooth.requestDevice({
      filters: [{name: 'BubblerTotem'}],
      optionalServices: [SERVICE_UUID]
    });
    dev.addEventListener('gattserverdisconnected', onDisconnect);
    var gatt = await dev.gatt.connect();
    var svc = await gatt.getPrimaryService(SERVICE_UUID);
    rxChr = await svc.getCharacteristic(RX_UUID);
    txChr = await svc.getCharacteristic(TX_UUID);
    await txChr.startNotifications();
    txChr.addEventListener('characteristicvaluechanged', function(e) {
      handleStatus(dec.decode(e.target.value));
    });
    try { handleStatus(dec.decode(await txChr.readValue())); } catch(e) {}
    gId('connectScreen').style.display = 'none';
    gId('main').style.display = 'block';
  } catch (e) {
    if (e.name !== 'NotFoundError') // user cancelled the chooser
      gId('connectError').textContent = e.message || String(e);
  }
}

function onDisconnect() {
  rxChr = txChr = null;
  gId('main').style.display = 'none';
  gId('connectScreen').style.display = 'flex';
  gId('connectError').textContent = 'Disconnected.';
}

async function write(obj) {
  if (!rxChr) return;
  var data = enc.encode(JSON.stringify(obj));
  try {
    if (rxChr.writeValueWithoutResponse) await rxChr.writeValueWithoutResponse(data);
    else await rxChr.writeValue(data);
  } catch (e) { /* writes can collide while one is in flight - drop */ }
}

function send(obj) { write(obj); }

function briInput(v) {
  briQueued = parseInt(v, 10);
  if (briTimer) return;
  briTimer = setTimeout(function() {
    briTimer = null;
    if (briQueued !== null) { write({bri: briQueued}); briQueued = null; }
  }, 150);
}

function handleStatus(txt) {
  var s;
  try { s = JSON.parse(txt); } catch(e) { return; }
  gId('stFx').textContent = s.on ? (s.fx || '–') : 'off';
  gId('stPl').textContent = PLAYLISTS[s.pl] || (s.pl > 0 ? ('#' + s.pl) : 'none');
  gId('stBub').textContent = s.cyc ? ('timer' + (s.mot ? ' · bubbling' : '')) : (s.mot ? 'on' : 'off');
  gId('stBub').className = (s.mot || s.cyc) ? 'grn' : '';
  if (!briHold && !briTimer && s.bri) gId('bri').value = s.bri;
  for (var i = 1; i <= 4; i++)
    gId('pl' + i).classList.toggle('active', s.on == 1 && s.pl == i);
  gId('offBtn').classList.toggle('active', s.on == 0);
  gId('bubOn').classList.toggle('active', !!s.mot && !s.cyc);
  gId('bubOff').classList.toggle('active', !s.mot && !s.cyc);
  gId('bubTimer').classList.toggle('active', !!s.cyc);
}
</script>
</body>
</html>
