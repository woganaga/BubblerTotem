; PlatformIO project for the Bubbler Totem
; Ported from the Arduino IDE sketch at ../BubblerIno
; (fqbn esp32:esp32:esp32s3:FlashSize=8M,PartitionScheme=default_8MB, arduino-esp32 core 3.3.10)

[env:esp32-s3-devkitc-1]
; Official platformio/espressif32 only ships arduino-esp32 2.x, which lacks the
; ESP_I2S.h I2SClass API used by AudioInput.cpp. pioarduino tracks core 3.x.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
build_flags = -Os

board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_upload.flash_size = 8MB

lib_deps =
    fastled/FastLED @ ^3.9.0
    kosme/arduinoFFT @ ^2.0.4
