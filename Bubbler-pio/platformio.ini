; PlatformIO project for the Bubbler Totem
; Ported from the Arduino IDE sketch at ../BubblerIno
; (fqbn esp32:esp32:esp32s3:FlashSize=8M,PartitionScheme=default_8MB, arduino-esp32 core 3.3.10)

; Default target while the BLE link is still being shaken out: builds with
; verbose BLE tracing (see BUBBLER_BLE_DEBUG below / BLE_LOG in BleServer.cpp).
; Once BLE is solid, either pass `-e esp32-s3-devkitc-1` explicitly, or flip
; this back to that name to make the quiet build the default again.
[platformio]
default_envs = esp32-s3-devkitc-1-debug

[env:esp32-s3-devkitc-1]
; Official platformio/espressif32 only ships arduino-esp32 2.x, which lacks the
; ESP_I2S.h I2SClass API used by AudioInput.cpp. pioarduino tracks core 3.x.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
; Route Serial over the ESP32-S3's native USB peripheral instead of UART0.
; Without this, Serial.print() goes to the physical UART0 pins (GPIO43/44)
; rather than the USB-C cable you're monitoring through - and GPIO44 is also
; MIC_SCK_PIN (AudioInput.cpp), so UART0 would conflict with the mic anyway.
build_flags =
    -Os
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_upload.flash_size = 8MB

lib_deps =
    fastled/FastLED @ ^3.9.0
    kosme/arduinoFFT @ ^2.0.4
    h2zero/NimBLE-Arduino @ ^2.2.1

; Same as above, plus verbose BLE wire-protocol tracing (every chunk/ack/
; command - see BLE_LOG in BleServer.cpp) to the Serial monitor. This is the
; default build (see [platformio] above) while BLE is still being tested;
; once it's solid, `pio run -e esp32-s3-devkitc-1` gets the quiet build
; without touching this file, or flip default_envs back when ready.
[env:esp32-s3-devkitc-1-debug]
extends = env:esp32-s3-devkitc-1
build_flags =
    ${env:esp32-s3-devkitc-1.build_flags}
    -D BUBBLER_BLE_DEBUG

; OTA upload over WiFi via ArduinoOTA, instead of USB. The device advertises
; itself as bubblertotem.local (WIFI_HOSTNAME in WifiSetup.h) once connected;
; --auth must match ArduinoOTA.setPassword() in OTAUpdate.cpp.
; Usage: pio run -e esp32-s3-devkitc-1-ota -t upload
[env:esp32-s3-devkitc-1-ota]
extends = env:esp32-s3-devkitc-1
upload_protocol = espota
upload_port = bubblertotem.local
upload_flags =
    --auth=mila
